<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <defs>
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="1.5" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <radialGradient id="aura" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#fbbf24" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#fbbf24" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- Faint wide ring -->
  <circle cx="16" cy="16" r="12" fill="none" stroke="#fbbf24" stroke-width="1.5" opacity="0.4" />

  <!-- Outer soft aura (gradient for smooth fade) -->
  <circle cx="16" cy="16" r="9" fill="url(#aura)" />

  <!-- Inner bright core with glow -->
  <circle cx="16" cy="16" r="4" fill="#fde68a" filter="url(#glow)" />
</svg>
